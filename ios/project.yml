name: RunSync
options:
  bundleIdPrefix: com.jakobevangelista
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
packages:
  ConnectIQ:
    url: https://github.com/garmin/connectiq-companion-app-sdk-ios
    exactVersion: 1.8.0
targets:
  RunSync:
    type: application
    platform: iOS
    sources:
      - path: RunSync
    dependencies:
      - package: ConnectIQ
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jakobevangelista.runsync
        PRODUCT_NAME: RunSync
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.0"
        OTHER_LDFLAGS: "$(inherited) -ObjC"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: W6MVZPAS4Y
    info:
      path: RunSync/Info.plist
      properties:
        CFBundleDisplayName: RunSync
        CFBundleURLTypes:
          - CFBundleURLName: com.jakobevangelista.runsync.garmin
            CFBundleURLSchemes:
              - runsync
        LSApplicationQueriesSchemes:
          - gcm-ciq
        NSBluetoothAlwaysUsageDescription: RunSync uses Bluetooth to receive live activity telemetry from your Garmin watch.
        UIBackgroundModes:
          - bluetooth-central
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        UILaunchScreen: {}
  RunSyncTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RunSyncTests
    dependencies:
      - target: RunSync
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jakobevangelista.runsync.tests
        SWIFT_VERSION: "5.0"
schemes:
  RunSync:
    build:
      targets:
        RunSync: all
        RunSyncTests: [test]
    test:
      targets:
        - RunSyncTests
